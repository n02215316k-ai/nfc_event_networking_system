{% extends 'base.html' %}

{% block title %}Register - Event Social Network{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="card shadow-lg">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0 text-center">
                        <i class="fas fa-user-plus me-2"></i>
                        Create Account
                    </h4>
                </div>
                <div class="card-body p-4">
                    
                    <form method="POST" action="/auth/signup" id="registerForm">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name *</label>
                            <input type="text" name="full_name" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email *</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Password *</label>
                            <input type="password" name="password" id="password" 
                                   class="form-control" minlength="6" required>
                            <small class="text-muted">Minimum 6 characters</small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Confirm Password *</label>
                            <input type="password" name="confirm_password" id="confirm_password" 
                                   class="form-control" minlength="6" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Phone</label>
                            <input type="tel" name="phone" class="form-control">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Job Title</label>
                            <input type="text" name="job_title" class="form-control">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Company</label>
                            <input type="text" name="company" class="form-control">
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="terms" required>
                            <label class="form-check-label" for="terms">
                                I agree to the <a href="/privacy" target="_blank">Terms & Privacy Policy</a> *
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-success btn-lg w-100 mb-3">
                            <i class="fas fa-user-plus me-2"></i>
                            Create Account
                        </button>
                        
                        <p class="text-center text-muted mb-0">
                            Already have an account? 
                            <a href="/auth/login" class="text-decoration-none">Login here</a>
                        </p>
                        
                    </form>
                    
                </div>
            </div>
            
        </div>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    
    if (password !== confirm) {
        e.preventDefault();
        alert('Passwords do not match!');
    }
});
</script>
{% endblock %}
